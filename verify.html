<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="focus/icon1.png" type="image/png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Verify Email · Nexus Study Lab</title>

  <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  CUSTOM FIREBASE ACTION HANDLER — EMAIL VERIFICATION             ║
    ║                                                                  ║
    ║  This page replaces Firebase's default verification landing     ║
    ║  page. To wire it up:                                           ║
    ║                                                                  ║
    ║  1. Deploy this file as verify.html at your site root           ║
    ║     (e.g. https://quietplace.space/verify.html)                 ║
    ║                                                                  ║
    ║  2. Firebase Console → Authentication → Templates →             ║
    ║     Email address verification → pencil icon → scroll down →    ║
    ║     "Customize action URL" → set to your verify.html URL        ║
    ║                                                                  ║
    ║  3. Firebase will automatically append ?mode=verifyEmail&       ║
    ║     oobCode=<code>&apiKey=<key>&lang=en to that URL — this       ║
    ║     page reads those query params itself, no manual setup       ║
    ║     needed beyond step 2.                                       ║
    ║                                                                  ║
    ║  4. Make sure your domain is in Authentication → Settings →     ║
    ║     Authorized domains, or applyActionCode will fail.           ║
    ║                                                                  ║
    ║  This page is plain web (not a Discord Activity surface) — it   ║
    ║  always runs in a normal browser tab, since email links open    ║
    ║  outside Discord. No CSP sandbox constraints apply here, but    ║
    ║  it still uses the same local firebase-bundle.js for            ║
    ║  consistency with the rest of the app.                          ║
    ╚══════════════════════════════════════════════════════════════════╝
  -->

  <link href="fonts/fonts.css" rel="stylesheet">

  <style>
    :root {
      --bg:          #080604;
      --accent:      #e8a060;
      --accent2:     #f0c080;
      --accent-dim:  rgba(232,160,96,0.45);
      --border:      rgba(255,220,160,0.09);
      --border-warm: rgba(255,200,120,0.24);
      --text:        #f0e8dc;
      --muted:       rgba(240,232,220,0.42);
      --muted2:      rgba(240,232,220,0.22);
      --error:       rgba(224,110,90,0.88);
      --success:     rgba(110,200,150,0.88);
      --radius:      14px;
      --radius-lg:   28px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #deco-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; user-select: none; }
    #particle-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    #vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 85% 75% at 50% 50%, transparent 25%, rgba(4,2,1,0.82) 100%);
    }
    .orb { position: absolute; border-radius: 50%; filter: blur(90px); animation: orb-drift ease-in-out infinite; }
    .orb-1 { width:520px;height:520px;background:radial-gradient(circle,rgba(232,140,60,0.065) 0%,transparent 70%);top:-180px;left:-120px;animation-duration:20s; }
    .orb-2 { width:420px;height:420px;background:radial-gradient(circle,rgba(160,90,200,0.045) 0%,transparent 70%);bottom:-120px;right:-90px;animation-duration:26s;animation-delay:-10s; }
    @keyframes orb-drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(28px,-18px) scale(1.04); }
      66%      { transform: translate(-18px,26px) scale(0.96); }
    }

    #ui-layer {
      position: relative; z-index: 10;
      min-height: 100vh; min-height: -webkit-fill-available;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    }

    .card {
      width: min(420px, 100%);
      background: rgba(255,228,175,0.047);
      border: 1px solid rgba(255,210,140,0.13);
      border-radius: var(--radius-lg);
      padding: 44px 44px 36px;
      backdrop-filter: blur(48px) saturate(140%);
      -webkit-backdrop-filter: blur(48px) saturate(140%);
      box-shadow: 0 0 0 1px rgba(255,220,160,0.04) inset, 0 0 90px rgba(232,160,96,0.055), 0 44px 90px rgba(0,0,0,0.6);
      animation: card-rise 0.9s cubic-bezier(.16,1,.3,1) both;
      text-align: center;
    }
    @keyframes card-rise {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    .brand-logo {
      width: 54px; height: 54px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(232,160,96,0.20), rgba(240,192,128,0.09));
      border: 1px solid rgba(232,160,96,0.26);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
    }
    .brand-logo svg { width: 24px; height: 24px; stroke: var(--accent); fill: none; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }

    .brand-logo.state-checking { animation: logo-pulse 1.6s ease-in-out infinite; }
    @keyframes logo-pulse {
      0%,100% { box-shadow: 0 0 28px rgba(232,160,96,0.10); }
      50%      { box-shadow: 0 0 48px rgba(232,160,96,0.26); }
    }
    .brand-logo.state-success { border-color: rgba(110,200,150,0.4); background: linear-gradient(135deg, rgba(110,200,150,0.18), rgba(110,200,150,0.06)); }
    .brand-logo.state-success svg { stroke: var(--success); }
    .brand-logo.state-error { border-color: rgba(224,110,90,0.4); background: linear-gradient(135deg, rgba(224,110,90,0.18), rgba(224,110,90,0.06)); }
    .brand-logo.state-error svg { stroke: var(--error); }

    .title {
      font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300;
      letter-spacing: .5px; margin-bottom: 12px; line-height: 1.3;
    }
    .title em { font-style: italic; color: var(--accent); }

    .status-text {
      font-size: .76rem; color: var(--muted); letter-spacing: .3px; line-height: 1.75;
      margin-bottom: 28px;
    }
    .status-text strong { color: var(--text); font-weight: 400; }
    .status-text.error   { color: var(--error); }
    .status-text.success { color: var(--success); }

    .gate-spinner {
      width: 28px; height: 28px; margin: 0 auto 24px;
      border: 2px solid rgba(232,160,96,0.18); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .85s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gate-spinner.hidden { display: none; }

    .btn-primary {
      width: 100%; padding: 14px; min-height: 48px;
      background: linear-gradient(135deg, rgba(232,160,96,0.18), rgba(240,192,128,0.11));
      border: 1px solid rgba(232,160,96,0.36); border-radius: var(--radius);
      color: var(--accent2); font-family: 'DM Sans', sans-serif;
      font-size: .71rem; font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all .3s;
      -webkit-tap-highlight-color: transparent;
      text-decoration: none; display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-primary:hover { border-color: rgba(232,160,96,.58); transform: translateY(-1px); box-shadow: 0 8px 28px rgba(232,160,96,.13); }

    .btn-secondary {
      width: 100%; padding: 11px; min-height: 44px; margin-top: 10px;
      background: transparent; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: .67rem; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all .3s; text-decoration: none;
      display: inline-flex; align-items: center; justify-content: center;
    }
    .btn-secondary:hover { border-color: var(--border-warm); color: var(--text); background: rgba(255,235,200,0.03); }

    .actions { display: none; flex-direction: column; gap: 0; }
    .actions.visible { display: flex; }

    .footer {
      width: min(420px, 100%); text-align: center;
      font-size: .59rem; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--muted2); padding: 20px 0;
    }
    .footer span { color: rgba(232,160,96,0.45); }

    @media (max-width: 480px) {
      .card { padding: 32px 24px 28px; border-radius: 22px; }
      .title { font-size: 1.45rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>

<div id="deco-layer" aria-hidden="true">
  <canvas id="particle-canvas"></canvas>
  <div id="vignette"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div id="ui-layer">
  <div class="card" role="status" aria-live="polite">
    <div class="brand-logo state-checking" id="state-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" id="icon-checking">
        <path d="M12 2C12 2 7 7.5 7 12a5 5 0 0010 0c0-1.5-.5-3-1.5-4.5C15 9 14 10 14 10s1-3-2-8z"/>
        <path d="M12 17a2 2 0 01-2-2c0-1.5 2-3.5 2-3.5s2 2 2 3.5a2 2 0 01-2 2z" stroke-width="1"/>
      </svg>
    </div>

    <div class="title" id="title">Verifying your <em>email</em></div>

    <div class="gate-spinner" id="spinner"></div>
    <div class="status-text" id="status-text">Hold on a moment while we confirm your address…</div>

    <div class="actions" id="actions">
      <a class="btn-primary" href="login.html" id="primary-action">Sign In</a>
    </div>
  </div>

  <div class="footer" aria-hidden="true">Nexus <span>Study</span> Lab &nbsp;·&nbsp; Private &amp; Secure</div>
</div>

<!-- Local IIFE bundle — same one used by login.html -->
<script src="js/firebase-bundle.js"></script>

<script>

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function setIconState(state) {
    var icon = document.getElementById('state-icon');
    icon.className = 'brand-logo state-' + state;
  }

  function showResult(opts) {
    document.getElementById('spinner').classList.add('hidden');
    setIconState(opts.state);
    document.getElementById('title').innerHTML = opts.title;
    var statusEl = document.getElementById('status-text');
    statusEl.innerHTML = opts.message;
    statusEl.className = 'status-text ' + (opts.state === 'success' ? 'success' : opts.state === 'error' ? 'error' : '');

    var actions = document.getElementById('actions');
    var primary = document.getElementById('primary-action');
    if (opts.primaryLabel) {
      primary.textContent = opts.primaryLabel;
      primary.href = opts.primaryHref || 'login.html';
      actions.classList.add('visible');
    }
  }

  function sanitize(str) {
    var d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
  }

  (function run() {
    var mode     = getParam('mode');
    var oobCode  = getParam('oobCode');

    if (mode !== 'verifyEmail') {
      // Wrong page for this link, or missing/garbled params.
      showResult({
        state: 'error',
        title: 'Invalid <em>link</em>',
        message: 'This verification link looks incomplete or was already used. Request a new one from the sign-in page.',
        primaryLabel: 'Back to Sign In',
        primaryHref: 'login.html',
      });
      return;
    }

    if (!oobCode) {
      showResult({
        state: 'error',
        title: 'Invalid <em>link</em>',
        message: 'No verification code was found in this link. Please use the link exactly as it appeared in your email.',
        primaryLabel: 'Back to Sign In',
        primaryHref: 'login.html',
      });
      return;
    }

    if (typeof window.FirebaseBundle === 'undefined') {
      showResult({
        state: 'error',
        title: 'Something went <em>wrong</em>',
        message: 'The verification service did not load. Please refresh the page.',
        primaryLabel: 'Refresh',
        primaryHref: window.location.href,
      });
      return;
    }

    var FB = window.FirebaseBundle;

    FB.initializeApp({
      apiKey:            'AIzaSyAmrYGmTuoHP_sY4pG_MFan2CKZPlirbAk',
      authDomain:        'nexus-study-lab.firebaseapp.com',
      projectId:         'nexus-study-lab',
      storageBucket:     'nexus-study-lab.firebasestorage.app',
      messagingSenderId: '610669979476',
      appId:             '1:610669979476:web:de9af7a8da3cb71f720ac1',
    });

    var auth = FB.getAuth();

    FB.applyActionCode(auth, oobCode).then(function() {
      showResult({
        state: 'success',
        title: 'Email <em>verified</em>',
        message: 'Your address is confirmed. You can sign in to Nexus Study Lab now.',
        primaryLabel: 'Sign In',
        primaryHref: 'login.html',
      });
    }).catch(function(err) {
      var msg = 'This link may have expired or already been used. Request a fresh verification email from the sign-in page.';
      if (err && err.code === 'auth/expired-action-code') {
        msg = 'This verification link has expired. Request a new one from the sign-in page.';
      } else if (err && err.code === 'auth/invalid-action-code') {
        msg = 'This verification link is invalid or has already been used. If you already verified, just sign in.';
      } else if (err && err.code === 'auth/user-disabled') {
        msg = 'This account has been disabled. Contact support if you believe this is a mistake.';
      }
      showResult({
        state: 'error',
        title: 'Couldn\u2019t <em>verify</em>',
        message: msg,
        primaryLabel: 'Back to Sign In',
        primaryHref: 'login.html',
      });
    });
  })();

</script>

<!-- Particle canvas — purely visual, mirrors login.html -->
<script>
(function initParticles() {
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var pts    = [];
  var W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (var i = 0; i < 45; i++) {
    pts.push({
      x:  Math.random() * window.innerWidth,
      y:  Math.random() * window.innerHeight,
      r:  Math.random() * 1.1 + 0.28,
      dx: (Math.random() - 0.5) * 0.14,
      dy: (Math.random() - 0.5) * 0.14,
      tw: Math.random() * Math.PI * 2,
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (var p, i = 0; i < pts.length; i++) {
      p = pts[i];
      p.x += p.dx; p.y += p.dy; p.tw += 0.015;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      var a = 0.13 + 0.18 * Math.sin(p.tw);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle   = 'rgba(232,160,96,' + a + ')';
      ctx.shadowColor = 'rgba(232,160,96,0.45)';
      ctx.shadowBlur  = 5;
      ctx.fill();
      ctx.shadowBlur  = 0;
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>

</body>
</html>
